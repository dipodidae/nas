## 4eva-rootpage.root.conf — bind-mounted by docker-compose.yml into
##   /config/nginx/site-confs/root.conf
##
## Serves the apex domain (4eva.me) by reverse-proxying to the 4eva-rootpage
## container. server_name is pinned to the apex so SWAG's wildcard subdomain
## handling still routes *.4eva.me to its own proxy-confs.

# HTTP → HTTPS for root domain only
server {
    listen 80;
    listen [::]:80;
    server_name 4eva.me;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name 4eva.me;

    include /config/nginx/ssl.conf;

    client_max_body_size 1m;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 4eva-rootpage;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
