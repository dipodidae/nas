<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080a" />
    <title>media ops · 4eva.me</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        --bg: #08080a; --panel: #121214; --border: #232327;
        --text: #e7e7ea; --muted: #9a9aa3; --dim: #6b6b73;
        --acid: #c8ff4d; --ok: #7bd88f; --warn: #f5c451; --bad: #ff6b6b;
        --mono: ui-monospace, "SFMono-Regular", Menlo, monospace;
      }
      html, body { margin: 0; min-height: 100%; }
      body {
        background:
          radial-gradient(50rem 50rem at 10% -10%, rgba(200,255,77,0.06), transparent 60%),
          radial-gradient(40rem 40rem at 100% 0%, rgba(24,182,201,0.05), transparent 55%),
          var(--bg);
        background-attachment: fixed;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        padding: 1.25rem;
      }
      .wrap { max-width: 1100px; margin: 0 auto; }
      header { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
      h1 .accent { color: var(--acid); }
      .meta { color: var(--dim); font-family: var(--mono); font-size: 0.8rem; }
      .overall { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); }
      .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
      .ok { color: var(--ok); } .bg-ok { background: var(--ok); }
      .warn { color: var(--warn); } .bg-warn { background: var(--warn); }
      .bad { color: var(--bad); } .bg-bad { background: var(--bad); }
      .grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
      @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } }
      .panel { background: color-mix(in oklab, var(--panel) 75%, transparent); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 1.1rem 1.2rem; }
      .panel h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin: 0 0 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
      .panel h2::before { content: ""; width: 4px; height: 14px; border-radius: 2px; background: var(--acid); }
      .row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
      .row:last-child { border-bottom: 0; }
      .row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .row .val { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); flex: none; }
      .pill { font-family: var(--mono); font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 6px; background: rgba(200,255,77,0.1); color: var(--acid); flex: none; }
      .sub { font-size: 0.75rem; color: var(--dim); margin-top: 0.15rem; }
      .containers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.4rem; }
      .chip { display: flex; align-items: center; gap: 0.45rem; padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 10px; font-size: 0.82rem; }
      .chip .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      footer { text-align: center; color: var(--dim); font-size: 0.75rem; margin-top: 1.5rem; }
      a { color: var(--acid); text-decoration: none; }
      #err { display: none; text-align: center; color: var(--bad); padding: 2rem; font-family: var(--mono); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>media<span class="accent">ops</span></h1>
          <div class="meta" id="generated">loading…</div>
        </div>
        <div class="overall" id="overall"><span class="dot bg-warn"></span>…</div>
      </header>

      <div id="err"></div>

      <div class="panel" style="margin-bottom:1rem">
        <h2>Containers <span id="container-count" class="meta" style="margin-left:auto"></span></h2>
        <div class="containers-grid" id="containers"></div>
      </div>

      <div class="grid">
        <div class="panel">
          <h2>Indexers &amp; *arr</h2>
          <div id="arr"></div>
        </div>
        <div class="panel">
          <h2>Downloaders</h2>
          <div id="downloaders"></div>
        </div>
      </div>

      <div class="panel" style="margin-top:1rem">
        <h2>Cron logs</h2>
        <div id="logs"></div>
      </div>

      <footer>
        auto-refreshes every 30s · <a href="/">← 4eva.me</a>
      </footer>
    </div>

    <script>
      const $ = (id) => document.getElementById(id)
      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]))
      const cls = (level) => (level === "ok" ? "ok" : level === "degraded" || level === "warn" ? "warn" : "bad")
      const dot = (level) => `<span class="dot bg-${level === 'ok' ? 'ok' : level === 'warn' || level === 'degraded' ? 'warn' : 'bad'}"></span>`

      function fmtAge(s) {
        if (s == null) return "?"
        const m = Math.floor(s / 60), h = Math.floor(m / 60)
        if (h > 0) return `${h}h ${m % 60}m`
        return `${m}m`
      }

      function render(d) {
        $("err").style.display = "none"
        const ts = new Date(d.generated_at)
        $("generated").textContent = "updated " + ts.toLocaleString()
        const ov = d.overall
        $("overall").innerHTML = dot(ov) + `<span class="${cls(ov)}">${esc(ov).toUpperCase()}</span>`

        // containers
        const cs = d.containers || []
        $("container-count").textContent = `${cs.filter(c => (c.healthy === 'healthy' || c.state === 'running')).length}/${cs.length} up`
        $("containers").innerHTML = cs.map((c) => {
          const bad = c.state !== "running" || c.healthy === "unhealthy"
          const lvl = bad ? "bad" : (c.healthy === "starting" ? "warn" : "ok")
          return `<div class="chip">${dot(lvl)}<span class="name" title="${esc(c.status)}">${esc(c.name)}</span></div>`
        }).join("") || `<div class="sub">no containers</div>`

        // arr
        $("arr").innerHTML = (d.arr_services || []).map((a) => {
          const issues = a.health_issues || []
          const lvl = !a.reachable ? "bad" : (a.error || issues.length ? "warn" : "ok")
          const q = a.queue_total != null ? `<span class="pill">queue ${a.queue_total}</span>` : ""
          const note = !a.reachable ? (a.error || "unreachable")
            : issues.length ? issues.map(i => i.message).join("; ")
            : (a.error || "healthy")
          return `<div class="row">${dot(lvl)}<div class="name">${esc(a.name)}<div class="sub">${esc(note)}</div></div>${q}</div>`
        }).join("")

        // downloaders (slskd + qbit)
        const dl = []
        const s = d.slskd || {}
        dl.push(`<div class="row">${dot(s.reachable ? 'ok' : 'bad')}<div class="name">slskd<div class="sub">${s.reachable ? esc('v' + (s.version || '?')) : esc(s.error || 'unreachable')}</div></div>${s.downloads_total != null ? `<span class="pill">${s.downloads_total} dl</span>` : ''}</div>`)
        const q = d.qbittorrent || {}
        dl.push(`<div class="row">${dot(q.reachable ? 'ok' : 'bad')}<div class="name">qBittorrent<div class="sub">${q.reachable ? esc((q.torrent_total ?? '') + ' torrents') : esc(q.error || 'unreachable')}</div></div></div>`)
        $("downloaders").innerHTML = dl.join("")

        // logs
        $("logs").innerHTML = (d.logs || []).map((l) => {
          const lvl = l.error ? "bad" : (l.stale ? "warn" : "ok")
          const name = (l.path || "").split("/").pop()
          return `<div class="row">${dot(lvl)}<div class="name">${esc(name)}<div class="sub">${esc(l.last_line || '')}</div></div><span class="val">${fmtAge(l.age_s)}</span></div>`
        }).join("") || `<div class="sub">no logs</div>`
      }

      async function tick() {
        try {
          const r = await fetch("./ops-status.json?t=" + Date.now(), { cache: "no-store" })
          if (!r.ok) throw new Error("HTTP " + r.status)
          render(await r.json())
        } catch (e) {
          $("err").style.display = "block"
          $("err").textContent = "could not load ops-status.json — is the media_ops_status cron writing it? (" + e.message + ")"
        }
      }
      tick()
      setInterval(tick, 30000)
    </script>
  </body>
</html>
