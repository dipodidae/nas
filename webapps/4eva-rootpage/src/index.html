<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4eva.me</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0a0f;
        color: #e8e8ed;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, rgba(15, 82, 186, 0.06) 0%, transparent 50%),
          #0a0a0f;
      }

      .container {
        max-width: 720px;
        width: 100%;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-size: clamp(2.5rem, 10vw, 5rem);
        font-weight: 200;
        letter-spacing: 0.08em;
        margin: 0 0 0.5rem;
        background: linear-gradient(135deg, #f5f5f5 0%, #a78bfa 50%, #60a5fa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        color: #6b7280;
        font-size: 0.95rem;
        margin: 0 0 3rem;
        font-weight: 400;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .grid a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        padding: 1.1rem 1.4rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #e8e8ed;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .grid a:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(167, 139, 250, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .grid a:active {
        transform: translateY(0);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .dot--purple { background: #a78bfa; }
      .dot--blue { background: #60a5fa; }
      .dot--emerald { background: #34d399; }
      .dot--amber { background: #fbbf24; }
      .dot--rose { background: #fb7185; }
      .dot--cyan { background: #22d3ee; }

      footer {
        margin-top: 4rem;
        color: #374151;
        font-size: 0.8rem;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>4eva.me</h1>
      <p class="subtitle">Select a service to continue</p>
      <div class="grid">
        <a href="https://jellyfin.4eva.me">
          <span class="dot dot--purple"></span> Jellyfin
        </a>
        <a href="https://jellyseerr.4eva.me">
          <span class="dot dot--blue"></span> Jellyseerr
        </a>
        <a href="https://sonarr.4eva.me">
          <span class="dot dot--emerald"></span> Sonarr
        </a>
        <a href="https://radarr.4eva.me">
          <span class="dot dot--amber"></span> Radarr
        </a>
        <a href="https://bazarr.4eva.me">
          <span class="dot dot--rose"></span> Bazarr
        </a>
        <a href="https://lidarr-bulk.4eva.me">
          <span class="dot dot--cyan"></span> Lidarr Bulk
        </a>
      </div>
      <footer>homelab</footer>
    </div>
  </body>
</html>
