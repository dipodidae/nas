# Docker Compose — Minisforum MS01 (32 GB RAM)
#
# Hardening kept:
# - security_opt: no-new-privileges
# - cap_drop: ALL + selective cap_add
# - 127.0.0.1 binds for internal-only ports
# - tmpfs for /tmp where supported
#
# Removed (Pi-era): mem_limit / mem_reservation / cpus / blkio_config / ulimit tuning.

networks:
  nas-network:
    name: nas-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'true'
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - VALIDATION=dns
      - DNSPLUGIN=cloudflare
      - CF_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - URL=${PUBLIC_DOMAIN}
      - SUBDOMAINS=wildcard
      - ONLY_SUBDOMAINS=false
      - EMAIL=${ADMIN_EMAIL}
    volumes:
      - ${CONFIG_DIRECTORY}/swag:/config
      - ./webapps/4eva-rootpage/4eva-rootpage.root.conf:/config/nginx/site-confs/root.conf:ro
      - ./nginx-cache:/var/cache/nginx:rw
    ports:
      - '443:443'
      - '80:80'
    restart: unless-stopped
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      4eva-rootpage:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, -f, 'https://localhost:443', -k]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - UMASK=022
    volumes:
      - ${CONFIG_DIRECTORY}/sonarr:/config
      - ${SHARE_DIRECTORY}/series:/tv
      - ${SHARE_DIRECTORY}/downloads:/downloads
    ports:
      - '127.0.0.1:8989:8989'
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:8989/ping']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - UMASK=022
    volumes:
      - ${CONFIG_DIRECTORY}/radarr:/config
      - ${SHARE_DIRECTORY}/movies:/movies
      - ${SHARE_DIRECTORY}/downloads:/downloads
    ports:
      - '127.0.0.1:7878:7878'
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:7878/ping']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # gluetun: WireGuard tunnel for slskd. slsknet soft-blocked our home IP after
  # reconnect storms; slskd now shares this container's network namespace so all
  # its egress (and Soulseek inbound on 50300) flows through AirVPN.
  # Aliases 'slskd' on nas-network so Lidarr/SWAG still resolve slskd:5030.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_MTU=${WIREGUARD_MTU:-1320}
      - FIREWALL_OUTBOUND_SUBNETS=172.30.0.0/24
      - FIREWALL_INPUT_PORTS=37020,37021
      - DNS_KEEP_NAMESERVER=on
      - TZ=${TZ:-UTC}
    ports:
      - '127.0.0.1:5030:5030' # slskd WebUI (behind SWAG)
      - '127.0.0.1:8080:8080' # qbittorrent WebUI (behind SWAG)
      - '37020:37020/tcp' # slskd Soulseek P2P inbound (forwarded by AirVPN)
      - '37021:37021/tcp' # qbittorrent BT inbound (forwarded by AirVPN)
      - '37021:37021/udp'
    restart: unless-stopped
    networks:
      nas-network:
        aliases:
          - slskd
          - qbittorrent
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, wget, -qO-, --timeout=5, --tries=1, https://ipinfo.io/ip]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # slskd: no linuxserver image exists; official slskd/slskd is the standard image.
  # Runs as the host PUID:PGID so it can write to the shared volumes.
  # Shares gluetun's network namespace (no own network / ports / swag label).
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    user: '${PUID:-1000}:${PGID:-1000}'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_DOWNLOADS_DIR=/downloads/complete/slskd
      - SLSKD_SHARED_DIR=/music
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_USERNAME=${SLSKD_USERNAME}
      - SLSKD_PASSWORD=${SLSKD_PASSWORD}
      - SLSKD_API_KEY=${API_KEY_SLSKD}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_DIRECTORY}/slskd:/app
      - ${SHARE_DIRECTORY}/music:/music
      - ${SHARE_DIRECTORY}/downloads:/downloads
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - autoheal=true
    # Liveness-only healthcheck — deliberately Soulseek-INDEPENDENT (just spiders
    # the web UI). It must NOT probe isLoggedIn: slskd's Soulseek login drops
    # transiently (ghost session on slsknet after a fast restart, VPN blip), and
    # restarting on that is actively harmful — a restart re-collides with the
    # stale server-side session and perpetuates the 5000ms login-timeout spiral
    # (32->64->128s backoff). The only cure is to stay DOWN 15-30 min so slsknet
    # reaps its ghost session; an autoheal restart is the opposite of the cure.
    # So autoheal (label above) only restarts slskd if the web server itself is
    # dead. Login state is watched separately, alert-only, by
    # scripts/slskd_login_watch.py — which never restarts.
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, 'http://localhost:5030/']
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  lidarr:
    image: lscr.io/linuxserver/lidarr:nightly
    container_name: lidarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - UMASK=022
    volumes:
      - ${CONFIG_DIRECTORY}/lidarr:/config
      - ${SHARE_DIRECTORY}/music:/music
      - ${SHARE_DIRECTORY}/downloads:/downloads
    ports:
      - '127.0.0.1:8686:8686'
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_started
      qbittorrent:
        condition: service_started
      slskd:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:8686/ping']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - UMASK=022
    volumes:
      - ${CONFIG_DIRECTORY}/bazarr:/config
      - ${SHARE_DIRECTORY}/movies:/movies
      - ${SHARE_DIRECTORY}/series:/tv
      - ${CONFIG_DIRECTORY}/subcleaner:/opt/subcleaner:ro
    ports:
      - '127.0.0.1:6767:6767'
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_started
      whisper:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:6767/ping']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # CPU-based Whisper ASR. On the MS01's Intel CPU, `small` transcribes ~5-10x real-time.
  # Upgrade to `medium` for better accuracy if you don't mind waiting longer per episode.
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ASR_ENGINE=faster_whisper
      - ASR_MODEL=small
      - ASR_DEVICE=cpu
      - ASR_MODEL_PATH=/models
    volumes:
      - ${CONFIG_DIRECTORY}/whisper:/models
    ports:
      - '127.0.0.1:9000:9000'
    restart: unless-stopped
    networks:
      - nas-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:9000/docs']
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  lingarr:
    image: lingarr/lingarr:latest
    container_name: lingarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - ASPNETCORE_URLS=http://+:8080
      - MAX_CONCURRENT_JOBS=2
      - DB_CONNECTION=sqlite
    volumes:
      - ${CONFIG_DIRECTORY}/lingarr:/app/config
      - ${SHARE_DIRECTORY}/movies:/app/movies
      - ${SHARE_DIRECTORY}/series:/app/tv
    ports:
      - '127.0.0.1:9876:8080'
    restart: unless-stopped
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=INFO
    ports:
      - '127.0.0.1:8191:8191'
    restart: unless-stopped
    networks:
      - nas-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:8191/docs']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_DIRECTORY}/prowlarr:/config
    ports:
      - '127.0.0.1:9696:9696'
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:9696/ping']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
      - QBITTORRENT_USER=${QBITTORRENT_USER}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS}
    volumes:
      - ${CONFIG_DIRECTORY}/qbittorrent:/config
      - ${SHARE_DIRECTORY}/downloads:/downloads
      # Self-heal: clears stale single-instance lockfiles at init so an
      # ungraceful kill (gluetun recreate) can't trap qbit in an s6 crash loop.
      - ./qbittorrent/custom-cont-init.d:/custom-cont-init.d:ro
    # qbit shares gluetun's netns; on gluetun recreate it is force-restarted.
    # Give it room to flush torrents.db + release its lock before SIGKILL so it
    # cleans up its own lockfile (default 10s is too short for the ~6MB DB+WAL).
    stop_grace_period: 120s
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:8080/']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # NOTE: Jellyfin volume mappings are NOT to be changed per owner's instructions
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_PUBLISHED_URL}
    volumes:
      - ${CONFIG_DIRECTORY}/jellyfin:/config
      - ${SHARE_DIRECTORY}:/data/movies:ro
    ports:
      - '8096:8096'
      - '8920:8920'
      - '7359:7359/udp'
      - '1900:1900/udp'
    networks:
      - nas-network
    restart: unless-stopped
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:8096/System/Info/Public']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=info
      - PORT=5056
    volumes:
      - ${CONFIG_DIRECTORY}/jellyseerr:/app/config
    ports:
      - '127.0.0.1:5056:5056'
    restart: unless-stopped
    depends_on:
      jellyfin:
        condition: service_started
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, 'http://localhost:5056/api/v1/status']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_DIRECTORY}/nextcloud:/config
      - ${SHARE_DIRECTORY}/nextcloud-data:/data
      - ${SHARE_DIRECTORY}:/external/drive:rw
      - ${SHARE_DIRECTORY}/movies:/external/movies:rw
      - ${SHARE_DIRECTORY}/series:/external/series:rw
      - ${SHARE_DIRECTORY}/music:/external/music:rw
      - ${SHARE_DIRECTORY}/books:/external/books:rw
      - ${SHARE_DIRECTORY}/downloads:/external/downloads:rw
    ports:
      - '127.0.0.1:8087:443'
    restart: unless-stopped
    depends_on:
      swag:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'https://localhost:443/status.php', -k]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 25m
        max-file: '3'

  lidarr-bulk:
    build:
      context: ./webapps/lidarr-bulk
    image: nas/lidarr-bulk:latest
    pull_policy: build
    container_name: lidarr-bulk
    # Locally-built image: Watchtower cannot pull, so opt-out.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Entrypoint chowns /config then drops to `node` via su-exec; needs these
    # caps briefly during startup, app itself runs unprivileged afterwards.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - TZ=${TZ:-UTC}
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
      - LIDARR_URL=http://lidarr:8686
      - LIDARR_API_KEY=${API_KEY_LIDARR}
      - CONFIG_DIR=/config
      # Session login. When both username and password are set, the UI requires
      # login and /api/* requires either a valid session cookie or bearer token.
      - APP_USERNAME=${LIDARR_BULK_USERNAME:-}
      - APP_PASSWORD=${LIDARR_BULK_PASSWORD:-}
      # Optional bearer-token gate on /api/* (for programmatic clients).
      - APP_BEARER_TOKEN=${LIDARR_BULK_BEARER_TOKEN:-}
      # Optional — enables the AI "Discover" tab (GPT-suggested albums). Reuses
      # the same OPENAI_API_KEY as the playlist-generator. Tab hides if unset.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${LIDARR_BULK_OPENAI_MODEL:-gpt-4o}
      - RATE_LIMIT_PER_MINUTE=30
      - BODY_LIMIT_BYTES=262144
    volumes:
      - ${CONFIG_DIRECTORY}/lidarr-bulk:/config
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped
    depends_on:
      lidarr:
        condition: service_started
    networks:
      - nas-network
    labels:
      - swag=enable
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, 'http://127.0.0.1:3000/healthz']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - PORT=11011
    volumes:
      - ${CONFIG_DIRECTORY}/cleanuparr:/config
    ports:
      - '127.0.0.1:11011:11011'
    restart: unless-stopped
    depends_on:
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      lidarr:
        condition: service_started
      qbittorrent:
        condition: service_healthy
    networks:
      - nas-network
    labels:
      - swag=enable
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:11011/api/v1/health']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  recyclarr:
    image: recyclarr/recyclarr:8
    container_name: recyclarr
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - TZ=${TZ:-UTC}
      - CRON_SCHEDULE=0 4 * * *
      - DOCKER_UID=${PUID:-1000}
      - DOCKER_GID=${PGID:-1000}
    volumes:
      - ${CONFIG_DIRECTORY}/recyclarr:/config
    restart: unless-stopped
    depends_on:
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
    networks:
      - nas-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  4eva-rootpage:
    build:
      context: ./webapps/4eva-rootpage
    image: nas/4eva-rootpage:latest
    pull_policy: build
    container_name: 4eva-rootpage
    # Locally-built image: Watchtower cannot pull, so opt-out.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - '127.0.0.1:8088:8080'
    restart: unless-stopped
    networks:
      - nas-network
    labels:
      - swag=enable
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, 'http://localhost:8080/healthz']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # PostgreSQL + pgvector backing store for playlist-generator. Internal only
  # (no host publish) — the app reaches it over nas-network. Data is persisted
  # under CONFIG_DIRECTORY like every other service. Left unlabeled for
  # Watchtower: never auto-update a database engine out from under its data.
  playlist-generator-db:
    image: pgvector/pgvector:pg16
    container_name: playlist-generator-db
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=playlist
      - POSTGRES_PASSWORD=${PLAYLIST_GENERATOR_DB_PASSWORD}
      - POSTGRES_DB=playlist_generator
    volumes:
      - ${CONFIG_DIRECTORY}/playlist-generator-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nas-network
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U playlist -d playlist_generator']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # Jellyfin Playlist Generator — unified container (Nuxt static frontend +
  # FastAPI + nginx basic-auth, all on :80). Source is a git submodule at
  # webapps/jellyfin-playlist-generator (its own GitHub repo, pulled with
  # `git submodule update --remote`); the build uses the repo-root Dockerfile.
  # Locally-built: Watchtower can't pull, so it stays unlabeled. SWAG fronts it
  # at playlist-generator.4eva.me via the hand-managed proxy-conf; the app does
  # its own basic auth (AUTH_USER/AUTH_PASS -> htpasswd), so /health is the only
  # unauthenticated path. The library starts empty — index it in-container via
  # `docker exec playlist-generator python -m app.cli_v3 <step>`.
  # JELLYFIN_* wire the "Push to Jellyfin" export: the app reaches Jellyfin over
  # nas-network (jellyfin:8096) with API_KEY_JELLYFIN, and rewrites local track
  # paths (/music/...) to the path Jellyfin reports (Jellyfin mounts
  # ${SHARE_DIRECTORY} at /data/movies, so music lives at /data/movies/music).
  playlist-generator:
    build:
      context: ./webapps/jellyfin-playlist-generator
    image: nas/playlist-generator:latest
    pull_policy: build
    container_name: playlist-generator
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ:-UTC}
      - DATABASE_URL=postgresql://playlist:${PLAYLIST_GENERATOR_DB_PASSWORD}@playlist-generator-db:5432/playlist_generator
      - AUTH_USER=${PLAYLIST_GENERATOR_USERNAME:-admin}
      - AUTH_PASS=${PLAYLIST_GENERATOR_PASSWORD}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DISCOGS_TOKEN=${DISCOGS_TOKEN:-}
      - MUSIC_DIRECTORIES=/music
      - M3U_OUTPUT_DIR=/playlists
      - SCAN_THREADS=${PLAYLIST_GENERATOR_SCAN_THREADS:-8}
      - EMBEDDING_MODEL_VERSION=1
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_API_KEY=${API_KEY_JELLYFIN:-}
      - JELLYFIN_USER_ID=${JELLYFIN_USER_ID:-}
      - LOCAL_PATH_PREFIX=/music
      - JELLYFIN_PATH_PREFIX=/data/movies/music
    volumes:
      - ${SHARE_DIRECTORY}/music:/music:ro
      - ${SHARE_DIRECTORY}/playlists:/playlists
    restart: unless-stopped
    depends_on:
      playlist-generator-db:
        condition: service_healthy
    networks:
      - nas-network
    labels:
      - swag=enable
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # Read-only Docker API proxy. Exposes only the endpoints Watchtower needs
  # (containers/images/networks/ping/version + POST/DELETE) so Watchtower never
  # touches /var/run/docker.sock directly. Only reachable inside nas-network.
  # NETWORKS=1 is required for Watchtower to disconnect/reconnect containers
  # on the custom nas-network during the recreate flow.
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - PING=1
      - VERSION=1
      - INFO=1
      - POST=1
      - DELETE=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
      - /tmp
    restart: unless-stopped
    networks:
      - nas-network
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # Watches containers labeled com.centurylinklabs.watchtower.enable=true and
  # pulls newer images on the schedule defined by WATCHTOWER_SCHEDULE.
  # Talks to Docker through `dockerproxy`, not the raw socket.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - TZ=${TZ:-UTC}
      - DOCKER_HOST=tcp://dockerproxy:2375
      - DOCKER_API_VERSION=1.40
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 4 * * *}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_REMOVE_VOLUMES=false
    depends_on:
      dockerproxy:
        condition: service_started
    restart: unless-stopped
    networks:
      - nas-network
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'

  # Restarts containers labeled `autoheal=true` when Docker marks them unhealthy.
  # Used for slskd, whose Soulseek login can drop while its web server stays up
  # (see slskd's login-aware healthcheck). Talks to Docker through `dockerproxy`
  # over TCP (DOCKER_SOCK=tcp://...), never the raw socket — same rule as
  # watchtower. dockerproxy already exposes CONTAINERS + POST, all autoheal needs.
  # Left unlabeled for watchtower, like the other control-plane containers.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - TZ=${TZ:-UTC}
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - DOCKER_SOCK=tcp://dockerproxy:2375
      - CURL_TIMEOUT=30
    depends_on:
      dockerproxy:
        condition: service_started
    restart: unless-stopped
    networks:
      - nas-network
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '2'
