# Prowlarr Indexer Priority Configuration
#
# This file defines the priority settings for various indexers.
# Priority scale: 1-50 (1 = highest priority, 50 = lowest priority)
#
# Categories:
# - Premium/High Quality (1-10): Best indexers with highest reliability
# - Mid-tier (11-30): Good quality indexers for general use
# - Standard (31-40): Average quality indexers
# - Backup/Low Priority (41-50): Fallback indexers or lower quality

indexer_priorities:
  # Premium/High Quality Indexers (1-10)
  YTS: 1 # High quality movie releases, excellent encodes
  Nyaa.si: 3 # Best anime tracker, very reliable
  SubsPlease: 5 # Reliable anime releases
  Anidex: 6 # Anime tracker with good variety
  Tokyo Toshokan: 7 # Japanese anime tracker
  EZTV: 8 # Excellent for TV shows, highly reliable
  showRSS: 10 # TV show RSS feeds

  # Mid-tier Indexers (11-30)
  1337x: 12 # Very popular, reliable general tracker
  kickasstorrents.to: 14 # KickassTorrents mirror
  kickasstorrents.ws: 14 # KickassTorrents mirror
  The Pirate Bay: 15 # Popular public tracker, good variety
  BT.etree: 16 # Lossless music tracker
  BitSearch: 17 # Modern DHT search engine
  Internet Archive: 18 # Legitimate content, public domain
  Isohunt2: 19 # Isohunt successor, good general tracker
  LimeTorrents: 20 # Decent general tracker
  TorrentGalaxyClone: 21 # General purpose tracker
  LinuxTracker: 22 # Specialized for Linux ISOs
  ExtraTorrent.st: 23 # ExtraTorrent clone
